version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # dtolnay/rust-toolchain refs select Rust toolchains (for example 1.86),
    # not action releases. Keep those selectors intentional.
    ignore:
      - dependency-name: dtolnay/rust-toolchain
    groups:
      github-actions:
        patterns:
          - "*"
