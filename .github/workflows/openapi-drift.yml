name: OpenAPI Drift

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compare with Latest Server OpenAPI
        run: >-
          python3 scripts/openapi-contract.py check
          --spec https://raw.githubusercontent.com/hubuum/hubuum/main/docs/openapi.json
