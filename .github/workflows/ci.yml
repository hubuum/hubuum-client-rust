name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Formatting, Lints, and Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build Documentation
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Validate Pinned OpenAPI Contract
        run: python3 scripts/openapi-contract.py validate

  test:
    name: Unit, Behavior, and Compile Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Full Test Suite
        run: cargo test --workspace --all-features --locked

  features:
    name: Feature Set (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-client
            flags: --no-default-features
          - name: async
            flags: --no-default-features --features async
          - name: blocking
            flags: --no-default-features --features blocking
          - name: async-typed
            flags: --no-default-features --features async,typed-schemas
          - name: blocking-typed
            flags: --no-default-features --features blocking,typed-schemas
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check Feature Set
        run: cargo check -p hubuum_client --locked ${{ matrix.flags }}

  msrv:
    name: MSRV (Rust 1.86)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@1.86

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check Workspace at MSRV
        run: cargo check --workspace --all-features --locked

  openapi-drift:
    name: OpenAPI Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compare with Server OpenAPI
        run: python3 scripts/openapi-contract.py check

  supply-chain:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Audit Published Advisories
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Licenses, Bans, and Sources
        uses: EmbarkStudios/cargo-deny-action@v2.0.20
        with:
          command: check bans licenses sources
          rust-version: 1.86

  semver:
    name: Public API Compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check SemVer
        uses: obi1kenobi/cargo-semver-checks-action@v2.9
        with:
          feature-group: all-features

  integration:
    name: Integration Tests (Pinned Server)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run Integration Test Suite
        run: ./scripts/run-integration-tests.sh --with-e2e-client -- --test-threads=1
        env:
          HUBUUM_INTEGRATION_SERVER_IMAGE: ghcr.io/hubuum/hubuum-server@sha256:05b464b18c0335df825e43c3967d6d02c67db5c5bcce5c4a5d23f2bdf2632fc8
